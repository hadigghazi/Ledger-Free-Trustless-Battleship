# Deploys the ONLY cloud-hosted piece: the message relay.
#
#   docker compose up --build -d
#
# The relay forwards public messages (commitments, shots, proof receipts)
# between players. It never sees a board and does no proving/verifying, so this
# image needs neither the RISC Zero toolchain nor any game logic.
#
# Players still run their own local prover agent + web UI (see
# scripts/play-online.*); point their NEXT_PUBLIC_RELAY_URL at this relay.
services:
  relay:
    build:
      context: .
      dockerfile: relay/Dockerfile
    image: zk-battleship-relay
    ports:
      - "9000:9000"
    environment:
      - PORT=9000
    restart: unless-stopped
